name: Automated API Tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman and reporters
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g newman-reporter-ctrf-json

      - name: Run API tests
        run: |
          mkdir -p reports ctrf
          
          # Set Philippines timezone
          export TZ=Asia/Manila
          
          # Collision-proof timestamp (seconds + run number)
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)_${GITHUB_RUN_NUMBER}
          REPORT_NAME="Test-Report_${TIMESTAMP}.html"

          newman run ./collections/ContactList-E2E-RegressionSuite.postman_collection.json \
            -e ./environments/ContactList-Production.postman_environment.json \
            -r cli,htmlextra,ctrf-json \
            --reporter-htmlextra-export "reports/$REPORT_NAME" \
            --reporter-ctrf-json-output-dir ctrf \
            --reporter-ctrf-json-output-file ctrf-report.json

          echo "Generated report: $REPORT_NAME"

      # 📊 Show CTRF in GitHub Summary
      - name: Publish CTRF to GitHub Step Summary
        if: always()
        run: |
          npx github-actions-ctrf ctrf/ctrf-report.json >> $GITHUB_STEP_SUMMARY

      # 📦 HTML report ONLY as artifact
      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: API-Test-HTML-Report-${{ github.run_number }}-${{ github.run_attempt }}
          path: reports/*.html
