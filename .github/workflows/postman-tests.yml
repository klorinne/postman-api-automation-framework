name: Automated API Tests

on:
  push:

permissions:
  contents: write

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman & Reporters
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g newman-reporter-ctrf-json

      - name: Run API Tests
        run: |
          mkdir -p reports ctrf

          # Set Philippines timezone
          export TZ=Asia/Manila

          # Collision-proof timestamp (seconds + run number)
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)_${GITHUB_RUN_NUMBER}
          REPORT_NAME="Test-Report_${TIMESTAMP}.html"

          echo "Generated report: $REPORT_NAME"

          newman run ./collections/ContactList-E2E-RegressionSuite.postman_collection.json \
            -e ./environments/ContactList-Production.postman_environment.json \
            -r cli,htmlextra,ctrf-json \
            --reporter-htmlextra-export "reports/$REPORT_NAME" \
            --reporter-ctrf-json-output-dir ctrf \
            --reporter-ctrf-json-output-file ctrf-report.json

      - name: Publish CTRF Summary
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json

      - name: Commit HTML Report to Repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/*.html || true

          git commit -m "Generate API test HTML report for Automated API Tests #${GITHUB_RUN_NUMBER}" || exit 0

          git push
