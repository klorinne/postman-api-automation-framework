name: Automated API Tests

on:
  push:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman & Reporters
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g newman-reporter-ctrf-json

      - name: Run API Tests
        run: |
          mkdir -p reports

          TIMESTAMP=$(date +%Y%m%d_%H%M%S%3N)
          REPORT_NAME="Test-Report_$TIMESTAMP.html"

          newman run ./collections/ContactList-E2E-RegressionSuite.postman_collection.json \
            -e ./environments/ContactList-Production.postman_environment.json \
            -r cli,htmlextra,ctrf-json \
            --reporter-htmlextra-export ./reports/$REPORT_NAME \
            --reporter-ctrf-json-output-dir ctrf \
            --reporter-ctrf-json-output-file ctrf-report.json \
            --reporter-ctrf-json-test-type api

      - name: Publish Test Summary Results
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json

      - name: Upload HTML Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: postman-api-reports
          path: reports/*.html
